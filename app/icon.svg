<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#162538"/>
      <stop offset="100%" stop-color="#0F1C2E"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0C47E"/>
      <stop offset="100%" stop-color="#B8922A"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4ECDC4" stop-opacity="0"/>
      <stop offset="30%" stop-color="#4ECDC4"/>
      <stop offset="70%" stop-color="#4ECDC4"/>
      <stop offset="100%" stop-color="#4ECDC4" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="11" fill="url(#bg)"/>

  <!-- Gold border -->
  <rect x="1.5" y="1.5" width="61" height="61" rx="10" fill="none" stroke="#C9A96E" stroke-width="1.2" opacity="0.55"/>

  <!-- BR letters -->
  <text
    x="32"
    y="43"
    font-family="Georgia, 'Palatino Linotype', 'Book Antiqua', Palatino, serif"
    font-size="27"
    font-weight="700"
    fill="url(#gold)"
    text-anchor="middle"
    letter-spacing="1"
  >BR</text>

  <!-- Teal accent line at bottom -->
  <rect x="10" y="53" width="44" height="2" rx="1" fill="url(#teal)"/>
</svg>
